<?xml version="1.0" encoding="UTF-8"?>
<!--
  GitHub social preview / OG image for Clawterm. 1280x640. Derives from
  the canonical mark in clawterm.svg, with the wordmark and tagline
  added beside it. Re-upload to the repo Settings -> Social preview
  after any edit. Tracking issue: 501.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1280"
  height="640"
  viewBox="0 0 1280 640"
  role="img"
  aria-labelledby="og-title og-desc"
>
  <title id="og-title">Clawterm</title>
  <desc id="og-desc">Clawterm wordmark with tagline on a dark background.</desc>

  <rect width="1280" height="640" fill="#0c0c0e" />

  <!--
    Mark, positioned on the left third. The path comes from clawterm.svg
    and is uniformly scaled to fit a 240x240 footprint centred at (260, 320).
    Original viewBox is 0..512; scale 240/512 = 0.46875 and translate so
    the original (256, 256) midpoint lands at (260, 320).
  -->
  <g transform="translate(260, 320) scale(0.46875) translate(-256, -256)">
    <path
      d="M183.467 255.905V219.905L327.467 156.496V197.917L228.876 237.496L230.205 235.348V240.462L228.876 238.314L327.467 277.894V319.314L183.467 255.905Z"
      fill="#E8364F"
    />
  </g>

  <!--
    Wordmark and tagline. Inter Variable is the brand UI face per
    docs/brand.md; system-ui falls back when Inter is missing on the
    rendering surface (GitHub strips fonts anyway, so the fallback runs
    in practice). The colours map to:
      Wordmark      f0f0f4   matches the brand accent (no alpha for OG)
      Tagline       70747e   tertiary text, matches the chrome register
  -->
  <text
    x="460"
    y="312"
    fill="#f0f0f4"
    font-family="Inter Variable, Inter, system-ui, -apple-system, sans-serif"
    font-size="96"
    font-weight="590"
    letter-spacing="-1.5"
  >Clawterm</text>
  <text
    x="460"
    y="372"
    fill="#70747e"
    font-family="Inter Variable, Inter, system-ui, -apple-system, sans-serif"
    font-size="28"
    font-weight="500"
    letter-spacing="0"
  >A terminal for running many AI agents at once.</text>
</svg>
