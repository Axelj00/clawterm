<?xml version="1.0" encoding="UTF-8"?>
<!--
  Clawterm canonical mark — single source for every Clawterm icon, favicon,
  and OG image in the repo. Tracking: #501.

  Design: a chevron pointing left, evoking the terminal `<` and the brand's
  "agent-aware terminal" identity. Matches the existing app icon and
  favicon — the brand book (docs/brand.md) marks logo redesign as a
  non-goal, so this file preserves the established geometry.

  Colors
  - Background: #0c0c0e — matches --bg-base in src/style.css
  - Mark:       #E8364F — the established mark red (not the --color-red
                          error token; the mark predates the token system)

  Regenerate bitmap assets (PNG + .icns) from this source via the
  commands in docs/brand/README.md. Re-run after any edit.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="512"
  height="512"
  viewBox="0 0 512 512"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Clawterm</title>
  <desc id="desc">A left-pointing chevron in brand red on a near-black square — the Clawterm mark.</desc>

  <!-- Dark canvas — same hue as the app's --bg-base. -->
  <rect width="512" height="512" fill="#0c0c0e" />

  <!--
    Chevron mark. Path traces the outer top arm, around the inner tip
    (with a small slit at the midpoint that gives the shape its "<" feel
    even at favicon-scale rendering), and back along the lower arm.
  -->
  <path
    d="M183.467 255.905V219.905L327.467 156.496V197.917L228.876 237.496L230.205 235.348V240.462L228.876 238.314L327.467 277.894V319.314L183.467 255.905Z"
    fill="#E8364F"
  />
</svg>
